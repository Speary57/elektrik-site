{% if user.is_authenticated %}
  <button type="button"
          class="fav-btn{% if product.id in favorite_ids %} is-active{% endif %}"
          data-fav-toggle
          data-url="{% url 'accounts:favorite_toggle' product.id %}"
          aria-pressed="{% if product.id in favorite_ids %}true{% else %}false{% endif %}"
          aria-label="Favorilere ekle / çıkar"
          title="Favorilere ekle / çıkar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
  </button>
{% else %}
  <a class="fav-btn fav-btn--guest"
     href="{% url 'accounts:login' %}"
     aria-label="Favorilere eklemek için giriş yapın"
     title="Favorilere eklemek için giriş yapın">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
  </a>
{% endif %}
