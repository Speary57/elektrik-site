services:
  - type: web
    name: elektrik-site
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: elektrik-site-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: kilaguzelektrik@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SITE_URL
        value: https://elektrik-site.onrender.com

databases:
  - name: elektrik-site-db
    plan: free
